services:
  nginx:
    image: nginx
    restart: always
    depends_on:
      - solder
    ports:
      - "${SOLDER_PORT:-80}:80"
    volumes:
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
      - ./public:/var/www/html/public:ro

  solder:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      - APP_NAME=${APP_NAME:-Technic Solder}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - HASH_VERIFY=${HASH_VERIFY:-false}
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_STACK=${LOG_STACK:-single}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-solder}
      - DB_USERNAME=${DB_USERNAME:-solder}
      - DB_PASSWORD=${DB_PASSWORD:-solder}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - SESSION_DRIVER=redis
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SOLDER_REPO_LOCATION=${SOLDER_REPO_LOCATION:-/var/www/mods.solder.test/}
      - SOLDER_MIRROR_URL=${SOLDER_MIRROR_URL:-http://mods.solder.test/}
      - SOLDER_MD5_CONNECT_TIMEOUT=${SOLDER_MD5_CONNECT_TIMEOUT:-5}
      - SOLDER_MD5_FILE_TIMEOUT=${SOLDER_MD5_FILE_TIMEOUT:-30}
    volumes:
      - .:/var/www/html
    command: ["/bin/bash", "/var/www/html/docker/setup.sh"]

  mysql:
    image: mariadb
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-solder}
      - MYSQL_USER=${DB_USERNAME:-solder}
      - MYSQL_PASSWORD=${DB_PASSWORD:-solder}
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - ./docker/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis
    restart: always
