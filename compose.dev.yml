services:
  nginx:
    image: nginx
    depends_on:
      - solder
    ports:
      - "8080:80"
    volumes:
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
      - ./public:/var/www/html/public:ro

  solder:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    command: ["/bin/bash", "/var/www/html/docker/dev-setup.sh"]

  postgres:
    image: postgres
    environment:
      - POSTGRES_DB=solder
      - POSTGRES_USER=solder
      - POSTGRES_PASSWORD=solder
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solder"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis

volumes:
  postgres_data:
  vendor:
